[package]
name = "roco-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "roco"
path = "src/main.rs"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("http-backends"))'] }

[dependencies]
roco-core = { path = "../core", features = ["http-backends"] }
roco-session = { path = "../session" }
roco-workspace = { path = "../workspace" }
tokio.workspace = true
serde_json.workspace = true
anyhow.workspace = true
tracing-subscriber.workspace = true
futures.workspace = true
