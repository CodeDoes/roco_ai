[workspace]
members = [
    "crates/core",
    "crates/cli",
    "crates/session",
    "crates/workspace",
    "crates/gateway",
    "crates/napi",
    "crates/infer",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
dotenvy = "0.15"
axum = { version = "0.8", features = ["ws"] }
clap = { version = "4", features = ["derive"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
