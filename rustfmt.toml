# RoCo AI rustfmt configuration
#
# Stable-only knobs. 'imports_granularity' needs nightly so we leave it
# unset; the default 'preserve' is fine for our style. New 2026-07-22
# along with the repository-wide 'cargo fmt --all' baseline.

edition = "2021"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
reorder_imports = true
use_small_heuristics = "Default"
