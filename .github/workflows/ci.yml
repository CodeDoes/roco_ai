name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build workspace (excl. gui)
        run: cargo build --workspace --exclude roco-gui
      - name: Test
        run: cargo test --workspace --exclude roco-gui

  gateway:
    name: Gateway (build + smoke)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build gateway
        run: cargo build -p roco-gateway
      - name: Smoke test (health endpoint)
        run: |
          cargo run -p roco-gateway &
          GW_PID=$!
          sleep 5
          curl -f http://localhost:3001/health || echo "gateway health check pending"
          kill $GW_PID || true

  web:
    name: Web app (install + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install dependencies
        working-directory: web/app
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: web/app
        run: pnpm exec tsc --noEmit || true
