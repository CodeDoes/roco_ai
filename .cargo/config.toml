# Compile-speed defaults. See COMPILE_SPEED_REPORT.md.
#
# Uses `cc` as the linker driver (available on every Unix system) + mold for
# actual linking. This is ~3x faster than the default ld linker.
#
# If mold is not installed (`sudo apt install mold`), remove the `-fuse-ld=mold`
# flags below and the system ld.bfd / ld.lld will be used instead.
#
# Parallelism: cargo runs 4 parallel crate builds, each rustc uses at most
# 2 codegen threads. Total cap ~8 threads, leaving 1 of 8 cores free.

[build]
jobs = 4

[term]
quiet = false

[target.x86_64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "codegen-units=2"]

[target.aarch64-unknown-linux-gnu]
linker = "cc"
rustflags = ["-C", "link-arg=-fuse-ld=mold", "-C", "codegen-units=2"]

[net]
git-fetch-with-cli = true
